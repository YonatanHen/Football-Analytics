secrets:
  kaggle_api_key:
    file: ./secrets/kaggle_api_key.txt

services:
  backend:
    build: ./backend
    ports: ["8000:8000"]
    environment:
      - MONGO_URI=mongodb://mongodb:27017/football_analytics
      - ALL_PROXY=socks5://tor:9050
    secrets: [kaggle_api_key]
    depends_on: [mongodb, tor]
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: ./frontend
    ports: ["5173:5173"]
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on: [backend]
    volumes:
      - ./frontend:/app
      - /app/node_modules

  mongodb:
    image: mongo:7
    ports: ["27017:27017"]
    volumes: [mongo_data:/data/db]

  tor:
    image: dperson/torproxy
    ports: ["9050:9050"]
    restart: unless-stopped

volumes:
  mongo_data:
