services:
  backend:
    build: ./backend
    init: true
    ports: ["8000:8000"]
    env_file: secrets.env
    environment:
      - MONGO_URI=mongodb://mongodb:27017/football_analytics
      # Privoxy (port 8118) fronts Tor SOCKS5 — works with Chrome/botasaurus unlike socks5:// directly
      - ALL_PROXY=http://tor:8118
      - HTTP_PROXY=http://tor:8118
      - HTTPS_PROXY=http://tor:8118
    depends_on:
      mongodb:
        condition: service_healthy
      tor:
        condition: service_started
    volumes:
      - ./backend:/app
      - ./logs:/app/logs
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports: ["5173:5173"]
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      backend:
        condition: service_started
    volumes:
      - ./frontend:/app
      - /app/node_modules
    restart: unless-stopped

  mongodb:
    image: mongo:7
    ports: ["27017:27017"]
    volumes: [mongo_data:/data/db]
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 60s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  tor:
    image: dperson/torproxy
    restart: unless-stopped

volumes:
  mongo_data:
