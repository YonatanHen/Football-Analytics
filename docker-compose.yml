secrets:
  kaggle_api_key:
    file: ./secrets/kaggle_api_key.txt

services:
  backend:
    build: ./backend
    ports: ["8000:8000"]
    environment:
      - MONGO_URI=mongodb://mongodb:27017/football_analytics
      - ALL_PROXY=socks5://tor:9050
    secrets: [kaggle_api_key]
    depends_on:
      mongodb:
        condition: service_healthy
      tor:
        condition: service_started
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports: ["5173:5173"]
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      backend:
        condition: service_started
    volumes:
      - ./frontend:/app
      - /app/node_modules
    restart: unless-stopped

  mongodb:
    image: mongo:7
    ports: ["27017:27017"]
    volumes: [mongo_data:/data/db]
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  tor:
    image: dperson/torproxy
    ports: ["9050:9050"]
    restart: unless-stopped

volumes:
  mongo_data:
