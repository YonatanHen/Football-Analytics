target-version = "py312"
line-length = 100

[lint]
select = ["E", "F", "W", "I", "UP", "B"]

[lint.flake8-bugbear]
# FastAPI dependency markers are called in argument defaults by design (B008 false positive).
extend-immutable-calls = [
    "fastapi.Depends",
    "fastapi.Query",
    "fastapi.Path",
    "fastapi.Body",
    "fastapi.Header",
    "fastapi.Cookie",
    "fastapi.File",
    "fastapi.Form",
    "fastapi.Security",
]

[format]
quote-style = "double"
